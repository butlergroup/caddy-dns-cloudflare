name: Trigger Release on Dependabot updates

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - Dockerfile
      - go.mod
      - go.sum

jobs:
  release:
    runs-on: ubuntu-latest

    # if: |
    #   startsWith(github.event.head_commit.message, 'Update ') || startsWith(github.event.head_commit.message, 'chore: ')

    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Determine next patch version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)

          echo "Current version: $LAST_TAG"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_TAG"

          PATCH=$((PATCH + 1))

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          echo "New version: $NEW_VERSION"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          DATE=$(date +%m-%d-%Y)

          if [[ -n "${BEFORE_SHA:-}" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            RANGE="${BEFORE_SHA}..${AFTER_SHA}"
          else
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
            if [[ -n "$LAST_TAG" ]]; then
              RANGE="${LAST_TAG}..HEAD"
            else
              RANGE="HEAD"
            fi
          fi

          echo "Using changelog commit range: $RANGE"

          git log --format='%s%n%b%n---END-COMMIT---' "$RANGE" > release_messages.txt

          awk '
            BEGIN { IGNORECASE = 1 }

            {
              line = $0
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", line)

              # Dependabot:
              # chore: Bump k8s.io/api from 0.36.0 to 0.36.1
              # Bump github.com/foo/bar from 1.2.3 to 1.2.4
              if (match(line, /Bump[[:space:]]+(.+)[[:space:]]+from[[:space:]]+([^[:space:]]+)[[:space:]]+to[[:space:]]+([^[:space:]]+)/, m)) {
                print "- Updated " m[1] " from " m[2] " to " m[3] " through automated dependency management"
                next
              }

              # Renovate:
              # Update cgr.dev/chainguard/wolfi-base Docker digest to cccc183
              # Update dependency actions/checkout to v6.0.3
              # chore(deps): update dependency foo to v1.2.3
              if (match(line, /Update[[:space:]]+(dependency[[:space:]]+|module[[:space:]]+|package[[:space:]]+|image[[:space:]]+)?(.+)[[:space:]]+to[[:space:]]+([^[:space:]]+)/, m)) {
                dep = m[2]
                to = m[3]

                gsub(/[[:space:]]+Docker[[:space:]]+(digest|tag)$/, "", dep)
                gsub(/[[:space:]]+$/, "", dep)

                print "- Updated " dep " to " to " through automated dependency management"
                next
              }

              # Renovate grouped PRs:
              # chore(deps): update all non-major dependencies
              if (line ~ /update.*dependencies/) {
                print "- " line
                next

              # Automated go.mod updates:
              if (match(line, /Updated[[:space:]]+(.+)[[:space:]]+from[[:space:]]+([^[:space:]]+)[[:space:]]+to[[:space:]]+([^[:space:]]+)/, m)) {
                print "- Updated " m[1] " from " m[2] " to " m[3] " through automated dependency management"
                next
              }
              }
            }
          ' release_messages.txt | sort -u > detected_changes.txt

          if [[ -s detected_changes.txt ]]; then
            CHANGE_TEXT="$(cat detected_changes.txt)"
          else
            CHANGE_TEXT="- Updated dependency(s) through automated dependency management"
          fi

          echo "Detected changelog text:"
          printf '%s\n' "$CHANGE_TEXT"

          cat > changelog_entry.md <<EOF
          ## Caddy K8s Ingress Controller & Helm Chart Version ${VERSION} (${DATE})

          #### New Features

          #### Improvements

          ${CHANGE_TEXT}

          #### Fixes

          ---

          EOF

          cat changelog_entry.md CHANGELOG.md > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit version updates
        run: |
          git add CHANGELOG.md

          git commit -m "chore(release): dependency updated. Bump project version to ${{ steps.version.outputs.version }}" || true

          git push origin HEAD:master

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create new tag & release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CURRENT_SHA=$(git rev-parse HEAD)

          gh api \
            --method POST \
            repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/${VERSION}" \
            -f sha="${CURRENT_SHA}"
